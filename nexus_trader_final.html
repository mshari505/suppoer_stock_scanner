<body style="margin:0;padding:0;background:#020408;">

<style>
:root{--bg:#020408;--sf:#0a1018;--s2:#101820;--b1:#182030;--b2:#1e2a3a;--buy:#00e676;--sell:#ff1744;--hold:#ffab00;--acc:#00b8d4;--tx:#cdd9e5;--mu:#556070;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'JetBrains Mono',monospace,Arial,sans-serif;}
.wrap{background:var(--bg);color:var(--tx);min-height:100vh;padding:0;}
.top{background:#060b12;border-bottom:1px solid var(--b2);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;position:sticky;top:0;z-index:100;}
.logo{font-size:1rem;font-weight:bold;color:var(--acc);letter-spacing:2px;}
.mkt-hrs{display:flex;align-items:center;gap:.5rem;font-size:.65rem;}
.badge{padding:.15rem .4rem;border-radius:3px;font-size:.6rem;font-weight:bold;}
.badge.open{background:rgba(0,230,118,.15);color:var(--buy);border:1px solid rgba(0,230,118,.3);}
.badge.closed{background:rgba(255,23,68,.1);color:var(--sell);border:1px solid rgba(255,23,68,.2);}
.sw{display:flex;gap:.4rem;}
.swb{font-size:.6rem;padding:.3rem .65rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:4px;}
.swb.on{background:rgba(0,184,212,.12);color:var(--acc);border-color:var(--acc);}
.swb.ons{background:rgba(255,171,0,.12);color:var(--hold);border-color:var(--hold);}
.search-row{background:#060b12;border-bottom:1px solid var(--b1);padding:.4rem 1rem;}
.sinp{width:100%;max-width:500px;display:block;margin:0 auto;background:var(--s2);border:1px solid var(--b2);color:var(--tx);font-size:.7rem;padding:.4rem .8rem;border-radius:4px;outline:none;}
.ticker{height:28px;background:var(--sf);border-bottom:1px solid var(--b1);overflow:hidden;white-space:nowrap;font-size:.6rem;display:flex;align-items:center;}
.ticker-inner{display:inline-flex;animation:scroll 50s linear infinite;}
@keyframes scroll{to{transform:translateX(-50%);}}
.tk{display:inline-flex;gap:.4rem;padding:0 1.2rem;border-right:1px solid var(--b2);}
.ts{color:var(--acc);font-weight:bold;}
.g{color:var(--buy);}.r{color:var(--sell);}
.main{padding:.75rem;max-width:1400px;margin:0 auto;}
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem;}
.hc{background:var(--sf);border:1px solid var(--b2);padding:.65rem .8rem;border-radius:4px;}
.hl{font-size:.5rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:.25rem;}
.hv{font-size:1rem;font-weight:bold;}
.hs{font-size:.58rem;margin-top:.15rem;}
.ctrl{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin-bottom:.75rem;}
.fb{font-size:.58rem;padding:.35rem .75rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:4px;transition:all .15s;}
.fb.fa{border-color:var(--acc);color:var(--acc);background:rgba(0,184,212,.08);}
.fb.fb2.fa{border-color:var(--buy);color:var(--buy);background:rgba(0,230,118,.08);}
.fb.fs.fa{border-color:var(--sell);color:var(--sell);background:rgba(255,23,68,.08);}
.fb.fh.fa{border-color:var(--hold);color:var(--hold);background:rgba(255,171,0,.08);}
.ssel{font-size:.58rem;background:var(--s2);border:1px solid var(--b2);color:var(--tx);padding:.35rem .6rem;border-radius:4px;cursor:pointer;outline:none;}
.rbtn{font-size:.58rem;padding:.35rem .75rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:4px;margin-left:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.65rem;margin-bottom:1rem;}
.card{background:var(--sf);border:1px solid var(--b2);border-radius:4px;overflow:hidden;}
.card.buy{border-left:3px solid var(--buy);}.card.sell{border-left:3px solid var(--sell);}.card.hold{border-left:3px solid var(--hold);}
.cb{padding:.85rem;}
.cr1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.csym{font-size:1.2rem;font-weight:bold;letter-spacing:1px;}
.cname{font-size:.5rem;color:var(--mu);margin-top:.15rem;}
.stag{font-size:.52rem;padding:.18rem .5rem;border-radius:3px;}
.stag.buy{background:rgba(0,230,118,.1);color:var(--buy);border:1px solid rgba(0,230,118,.2);}
.stag.sell{background:rgba(255,23,68,.1);color:var(--sell);border:1px solid rgba(255,23,68,.2);}
.stag.hold{background:rgba(255,171,0,.1);color:var(--hold);border:1px solid rgba(255,171,0,.2);}
.cprice{font-size:1.1rem;font-weight:bold;margin-bottom:.12rem;}
.cchg{font-size:.62rem;margin-bottom:.65rem;}
.ema-blk{background:#060b12;border:1px solid var(--b1);padding:.5rem .6rem;margin-bottom:.6rem;border-radius:3px;}
.el{font-size:.48rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:.38rem;}
.er{display:flex;align-items:center;gap:.4rem;margin-bottom:.22rem;font-size:.55rem;}
.ek{width:40px;color:var(--mu);font-size:.52rem;}
.et{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.ef{height:100%;border-radius:2px;transition:width .7s ease;}
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:.3rem;margin-bottom:.6rem;}
.met{background:#060b12;border:1px solid var(--b1);padding:.35rem .4rem;border-radius:3px;}
.mml{font-size:.48rem;text-transform:uppercase;color:var(--mu);margin-bottom:.12rem;}
.mmv{font-size:.68rem;}
.arow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.3rem;margin-bottom:.5rem;}
.abt{font-size:.5rem;text-transform:uppercase;padding:.4rem .25rem;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.1rem;border:1px solid;background:transparent;min-height:46px;justify-content:center;}
.abt-l{font-size:.44rem;opacity:.6;}.abt-v{font-size:.62rem;font-weight:bold;}
.abt.ent{border-color:rgba(0,184,212,.35);color:var(--acc);}

.abt.stp{border-color:rgba(255,23,68,.3);color:var(--sell);}
.cbtn{width:100%;font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;padding:.5rem;border:1px solid var(--b2);background:var(--s2);color:var(--mu);cursor:pointer;border-radius:4px;margin-bottom:.5rem;}
.cbtn:hover{border-color:var(--acc);color:var(--acc);}
.rbox{font-size:.55rem;color:var(--mu);line-height:1.6;border-left:2px solid var(--b2);padding:.35rem .55rem;}
.spot{background:var(--sf);border:1px solid var(--b2);border-radius:4px;margin-bottom:.75rem;overflow:hidden;display:none;}
.sph{display:flex;justify-content:space-between;align-items:center;padding:.65rem 1rem;background:var(--s2);border-bottom:1px solid var(--b2);}
.sph-t{font-size:.65rem;font-weight:bold;color:var(--acc);text-transform:uppercase;}
.sph-cl{font-size:.55rem;padding:.25rem .6rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:3px;}
.sbody{display:grid;grid-template-columns:1.2fr 1fr;}
.sl{padding:1rem;border-right:1px solid var(--b2);}
.sr{padding:1rem;display:flex;flex-direction:column;gap:.65rem;overflow-y:auto;max-height:580px;}
.ssym{font-size:2rem;font-weight:bold;letter-spacing:2px;}
.sname{font-size:.55rem;color:var(--mu);margin:.15rem 0 .65rem;}
.sprice{font-size:1.4rem;font-weight:bold;}
.schg{font-size:.65rem;margin-bottom:.8rem;}
.sact{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin-bottom:.8rem;}
.sabt{font-size:.55rem;text-transform:uppercase;padding:.5rem .35rem;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.15rem;border:1px solid;background:transparent;min-height:52px;justify-content:center;}
.sabt-l{font-size:.46rem;opacity:.65;}.sabt-v{font-size:.72rem;font-weight:bold;}
.sabt.ent{border-color:rgba(0,184,212,.4);color:var(--acc);}
.sabt.tgt{border-color:rgba(0,230,118,.4);color:var(--buy);}
.sabt.stp{border-color:rgba(255,23,68,.35);color:var(--sell);}
.cw{height:170px;background:#060b12;border:1px solid var(--b1);border-radius:3px;margin-bottom:.5rem;position:relative;}
.cw canvas{width:100%!important;height:100%!important;}
.cleg{display:flex;flex-wrap:wrap;gap:.7rem;font-size:.52rem;color:var(--mu);}
.cli{display:flex;align-items:center;gap:.28rem;}
.sb-blk{background:#060b12;border:1px solid var(--b1);padding:.65rem;border-radius:3px;}
.sb-tt{font-size:.5rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:.5rem;}
.sb-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;font-size:.55rem;}
.sb-lbl{flex:1;color:var(--mu);}
.pill{font-size:.48rem;padding:.12rem .38rem;border-radius:2px;}
.pb{background:rgba(0,230,118,.1);color:var(--buy);border:1px solid rgba(0,230,118,.2);}
.ps{background:rgba(255,23,68,.1);color:var(--sell);border:1px solid rgba(255,23,68,.2);}
.pn{background:rgba(255,171,0,.1);color:var(--hold);border:1px solid rgba(255,171,0,.2);}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.zone{border:1px solid var(--b2);padding:.65rem;border-radius:3px;}
.zb{border-top:2px solid var(--buy);}.zs{border-top:2px solid var(--sell);}
.zt{font-size:.58rem;font-weight:bold;margin-bottom:.45rem;}
.zb .zt{color:var(--buy);}.zs .zt{color:var(--sell);}
.zrow{display:flex;justify-content:space-between;font-size:.54rem;color:var(--mu);margin-bottom:.22rem;}
.zrow span:last-child{color:var(--tx);}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--b2);font-size:.62rem;padding:.5rem 1rem;border-radius:4px;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.tb{border-color:rgba(0,230,118,.4);color:var(--buy);}
.toast.ts{border-color:rgba(255,23,68,.4);color:var(--sell);}
.toast.ti{border-color:rgba(0,184,212,.4);color:var(--acc);}
.heat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:.35rem;margin-bottom:1rem;}
.hcell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;border:1px solid transparent;}
.hcell:hover{border-color:rgba(255,255,255,.12);}
.hsym{font-size:.6rem;font-weight:bold;margin-bottom:.15rem;}
.hpct{font-size:.55rem;}
.sec-lbl{font-size:.68rem;font-weight:bold;text-transform:uppercase;letter-spacing:2px;color:var(--mu);flex:1;}
.sec-lbl span{color:var(--acc);}
@media(max-width:600px){
  .hero{grid-template-columns:1fr 1fr;}
  .grid{grid-template-columns:1fr;}
  .sbody{grid-template-columns:1fr;}
  .sl{border-right:none;border-bottom:1px solid var(--b2);}
  .sr{max-height:none;}
  .zones{grid-template-columns:1fr;}
  .ssym{font-size:1.5rem;}
  .top{padding:.5rem;}
}
</style>

<script>
var US=[
  {sym:'AAPL',name:'Apple Inc.',base:192,cur:'$'},
  {sym:'NVDA',name:'NVIDIA Corp.',base:875,cur:'$'},

  {sym:'XOM',name:'ExxonMobil',base:115,cur:'$'},
  {sym:'WMT',name:'Walmart',base:62,cur:'$'}
];
var TASI=[
  {sym:'2222',name:'Saudi Aramco',base:28.5,cur:'SAR'},
  {sym:'1180',name:'Al Rajhi Bank',base:95,cur:'SAR'},
  {sym:'2010',name:'SABIC',base:67,cur:'SAR'},

  {sym:'3007',name:'Saudi Cement',base:68,cur:'SAR'},
  {sym:'3030',name:'Saudi Kayan',base:9.8,cur:'SAR'},
  {sym:'1030',name:'Saudi Inv. Bank',base:16,cur:'SAR'},
  {sym:'1211',name:'Arab Natl Bank',base:24,cur:'SAR'},
  {sym:'1120',name:'Al Jazira Bank',base:18,cur:'SAR'},
  {sym:'4082',name:'Dur Hospitality',base:22,cur:'SAR'},
  {sym:'2330',name:'Adv. Petrochem',base:42,cur:'SAR'},
  {sym:'4007',name:'Saudi German Health',base:45,cur:'SAR'},
  {sym:'4002',name:'Etihad Telecom',base:34,cur:'SAR'}
];
var mkt='us',allData=[],fil='all',spChart=null;
function rng(s,n){return((Math.sin(s*n*9301+49297)*233280)%1+1)/2;}
function sdh(str){var a=0;for(var i=0;i<str.length;i++)a+=str.charCodeAt(i);return a;}
function buildStock(d){
  var s=sdh(d.sym),f=function(n){return rng(s,n);};
  var trend=f(11)>0.5?1:-1;
  var price=Math.round((d.base*(0.93+f(1)*0.14))*100)/100;
  var e50=Math.round((price*(0.97+f(2)*0.025*trend))*100)/100;
  var e100=Math.round((e50*(0.97+f(3)*0.025*trend))*100)/100;
  var e200=Math.round((e100*(0.96+f(4)*0.03*trend))*100)/100;
  var change=Math.round(((f(5)-0.46)*7)*100)/100;
  var volume=Math.floor(f(6)*60000000+2000000);
  var avgVol=Math.floor(f(7)*45000000+5000000);
  var rsiV=Math.round((28+f(8)*52)*10)/10;
  var macdV=Math.round(((f(9)-0.48)*5)*100)/100;
  var aligned=price>e50&&e50>e100&&e100>e200;
  var volSpike=volume>avgVol*1.45;
  var signal='hold';
  if(aligned&&rsiV<66&&(macdV>0||volSpike))signal='buy';
  else if(!aligned||rsiV>73||macdV<-1.8)signal='sell';
  var hist=[],p=price*0.84;
  for(var i=0;i<60;i++){p*=(1+(Math.sin(s*i*0.28+i*0.4)*0.009+(f(i+20)-0.49)*0.018)*(trend>0?1.003:0.998));hist.push(Math.round(p*100)/100);}
  hist.push(price);
  var be=Math.round(e50*0.993*100)/100,bt=Math.round(price*1.14*100)/100,bs=Math.round(e200*0.982*100)/100;
  var se=Math.round(e50*1.005*100)/100,ss=Math.round(price*1.06*100)/100;
  var pot=Math.round(((bt-be)/be*100)*10)/10,rsk=Math.round(((be-bs)/be*100)*10)/10,rr=Math.round((pot/Math.max(rsk,0.01))*100)/100;
  var reasons;
  if(signal==='buy')reasons=['EMA50>EMA100>EMA200 bullish stack','RSI '+rsiV+' not overbought',volSpike?'Volume spike +'+Math.round((volume/avgVol-1)*100)+'%':'MACD positive momentum','Price '+(Math.round(((price-e50)/e50)*10000)/100)+'% above EMA50'];
  else if(signal==='sell')reasons=[price<e50?'Price broke below EMA50':'EMA alignment broken',rsiV>73?'RSI '+rsiV+' overbought':'Momentum weakening',macdV<-1.8?'MACD '+macdV+' bearish':'MACD turning negative',volSpike?'High sell volume':'Volume below average'];
  else reasons=['EMA stack inconclusive','RSI '+rsiV+' neutral zone','Waiting for breakout','Watch EMA50 cross'];
  return{sym:d.sym,name:d.name,cur:d.cur,price:price,e50:e50,e100:e100,e200:e200,change:change,volume:volume,avgVol:avgVol,rsiV:rsiV,macdV:macdV,signal:signal,reasons:reasons,hist:hist,aligned:aligned,volSpike:volSpike,be:be,bt:bt,bs:bs,se:se,ss:ss,pot:pot,rsk:rsk,rr:rr};
}
function fmt(n){if(n>=1000)return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n.toFixed(n<10?3:2);}
function fv(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return''+n;}
function loadData(){allData=(mkt==='us'?US:TASI).map(buildStock);}
function renderHero(){
  var b=0,s=0,h=0;
  for(var i=0;i<allData.length;i++){if(allData[i].signal==='buy')b++;else if(allData[i].signal==='sell')s++;else h++;}
  var tg=allData[0],tl=allData[0],hv=allData[0];
  for(var i=1;i<allData.length;i++){if(allData[i].change>tg.change)tg=allData[i];if(allData[i].change<tl.change)tl=allData[i];if(allData[i].volume>hv.volume)hv=allData[i];}
  var sc=b>s?'var(--buy)':b<s?'var(--sell)':'var(--hold)',sn=b>s?'BULLISH':b<s?'BEARISH':'NEUTRAL';
  document.getElementById('heroEl').innerHTML='<div class="hc"><div class="hl">Sentiment</div><div class="hv" style="color:'+sc+'">'+sn+'</div><div class="hs"><span class="g">'+b+' buy</span> | <span class="r">'+s+' sell</span></div></div><div class="hc"><div class="hl">Top Gainer</div><div class="hv">'+tg.sym+'</div><div class="hs g">+'+tg.change+'%</div></div><div class="hc"><div class="hl">Top Loser</div><div class="hv">'+tl.sym+'</div><div class="hs r">'+tl.change+'%</div></div><div class="hc"><div class="hl">Vol Leader</div><div class="hv">'+hv.sym+'</div><div class="hs" style="color:var(--mu)">'+fv(hv.volume)+'</div></div>';
}
function renderTicker(){
  var all=allData.concat(allData),h='';
  for(var i=0;i<all.length;i++){var s=all[i];h+='<span class="tk"><span class="ts">'+s.sym+'</span><span>'+s.cur+fmt(s.price)+'</span><span class="'+(s.change>=0?'g':'r')+'">'+(s.change>=0?'+':'')+s.change+'%</span></span>';}
  document.getElementById('tickerEl').innerHTML=h;
}
function setFil(f){
  fil=f;
  var ids=['fAll','fBuy','fSell','fHold'];
  for(var i=0;i<ids.length;i++)document.getElementById(ids[i]).classList.remove('fa');
  document.getElementById({all:'fAll',buy:'fBuy',sell:'fSell',hold:'fHold'}[f]).classList.add('fa');
  renderCards();
}
function renderCards(){
  var sort=document.getElementById('sortSel').value,data=allData.slice();
  if(fil!=='all'){var t=[];for(var i=0;i<data.length;i++)if(data[i].signal===fil)t.push(data[i]);data=t;}
  if(sort==='gain')data.sort(function(a,b){return b.change-a.change;});
  else if(sort==='loss')data.sort(function(a,b){return a.change-b.change;});
  else if(sort==='vol')data.sort(function(a,b){return b.volume-a.volume;});
  else if(sort==='rsi')data.sort(function(a,b){return a.rsiV-b.rsiV;});
  else if(sort==='rr')data.sort(function(a,b){return b.rr-a.rr;});
  else data.sort(function(a,b){var o={buy:0,sell:1,hold:2};return o[a.signal]-o[b.signal];});
  var h='';
  for(var i=0;i<data.length;i++)h+=mkCard(data[i]);
  document.getElementById('cardsGrid').innerHTML=h;
  var cards=document.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++){
    (function(sym){
      var el=document.querySelector('.card[data-sym="'+sym+'"]');
      if(!el)return;
      el.querySelector('.cbtn').addEventListener('click',function(e){e.stopPropagation();openSpot(sym);});
      var ab=el.querySelectorAll('.abt'),s=findS(sym);
      ab[0].addEventListener('click',function(e){e.stopPropagation();cp(sym,'Entry',s.be,s.cur);});
      ab[1].addEventListener('click',function(e){e.stopPropagation();cp(sym,'Target',s.bt,s.cur);});
      ab[2].addEventListener('click',function(e){e.stopPropagation();cp(sym,'Stop',s.bs,s.cur);});
    })(data[i].sym);
  }
}
function mkCard(s){
  var p50=Math.min((s.e50/s.price)*90,99),p100=Math.min((s.e100/s.price)*90,99),p200=Math.min((s.e200/s.price)*90,99);
  var rc=s.rsiV>70?'var(--sell)':s.rsiV<35?'var(--buy)':'var(--tx)',rrc=s.rr>=2?'var(--buy)':s.rr>=1?'var(--tx)':'var(--sell)';
  return '<div class="card '+s.signal+'" data-sym="'+s.sym+'"><div class="cb"><div class="cr1"><div><div class="csym">'+s.sym+'</div><div class="cname">'+s.name+'</div></div><div class="stag '+s.signal+'">'+s.signal.toUpperCase()+'</div></div><div class="cprice">'+s.cur+fmt(s.price)+'</div><div class="cchg '+(s.change>=0?'g':'r')+'">'+(s.change>=0?'+':'')+s.change+'%</div><div class="ema-blk"><div class="el">EMA Alignment</div>'+mkER('EMA 50',p50,s.price>=s.e50,s.e50,s.cur)+mkER('EMA 100',p100,s.price>=s.e100,s.e100,s.cur)+mkER('EMA 200',p200,s.price>=s.e200,s.e200,s.cur)+'</div><div class="mets"><div class="met"><div class="mml">RSI</div><div class="mmv" style="color:'+rc+'">'+s.rsiV+'</div></div><div class="met"><div class="mml">MACD</div><div class="mmv '+(s.macdV>=0?'g':'r')+'">'+(s.macdV>=0?'+':'')+s.macdV+'</div></div><div class="met"><div class="mml">Vol</div><div class="mmv">'+fv(s.volume)+'</div></div><div class="met"><div class="mml">R/R</div><div class="mmv" style="color:'+rrc+'">'+s.rr+'</div></div></div><div class="arow"><button class="abt ent"><span class="abt-l">Entry Price</span><span class="abt-v">'+s.cur+fmt(s.be)+'</span></button><button class="abt tgt"><span class="abt-l">Target Price</span><span class="abt-v">'+s.cur+fmt(s.bt)+'</span></button><button class="abt stp"><span class="abt-l">Stop Loss</span><span class="abt-v">'+s.cur+fmt(s.bs)+'</span></button></div><button class="cbtn">View Chart + Full Analysis</button><div class="rbox">'+s.reasons[0]+'</div></div></div>';
}
function mkER(lbl,pct,above,price,cur){return '<div class="er"><span class="ek">'+lbl+'</span><div class="et"><div class="ef" style="width:'+pct+'%;background:'+(above?'var(--buy)':'var(--sell)')+'"></div></div><span style="width:66px;text-align:right;font-size:.55rem;">'+cur+fmt(price)+'</span><span style="width:12px;text-align:center;color:'+(above?'var(--buy)':'var(--sell)')+';">'+(above?'^':'v')+'</span></div>';}
function findS(sym){for(var i=0;i<allData.length;i++)if(allData[i].sym===sym)return allData[i];return null;}
function cp(sym,label,price,cur){var txt=sym+' '+label+': '+cur+fmt(price);try{navigator.clipboard.writeText(txt);}catch(e){}toast('Copied: '+txt,label==='Target'?'tb':label==='Stop'?'ts':'ti');}
function openSpot(sym){
  var s=findS(sym);if(!s)return;
  document.getElementById('spotEl').style.display='block';
  document.getElementById('spSym').textContent=s.sym;
  document.getElementById('spName').textContent=s.name+' - '+(mkt==='us'?'NASDAQ/NYSE':'Tadawul');
  document.getElementById('spPrice').textContent=s.cur+fmt(s.price);
  document.getElementById('spPrice').className='sprice '+(s.change>=0?'g':'r');
  document.getElementById('spChg').textContent=(s.change>=0?'+':'')+s.change+'% today';
  document.getElementById('spChg').className='schg '+(s.change>=0?'g':'r');
  var tag=document.getElementById('spTag');tag.textContent=s.signal.toUpperCase();tag.className='stag '+s.signal;
  document.getElementById('spAct').innerHTML='<button class="sabt ent" id="sa1"><span class="sabt-l">Entry Price</span><span class="sabt-v">'+s.cur+fmt(s.be)+'</span></button><button class="sabt tgt" id="sa2"><span class="sabt-l">Target Price</span><span class="sabt-v">'+s.cur+fmt(s.bt)+'</span></button><button class="sabt stp" id="sa3"><span class="sabt-l">Stop Loss</span><span class="sabt-v">'+s.cur+fmt(s.bs)+'</span></button>';
  document.getElementById('sa1').onclick=function(){cp(s.sym,'Entry',s.be,s.cur);};
  document.getElementById('sa2').onclick=function(){cp(s.sym,'Target',s.bt,s.cur);};
  document.getElementById('sa3').onclick=function(){cp(s.sym,'Stop',s.bs,s.cur);};
  var sbd=[{l:'EMA stack',v:s.aligned?'Bullish':'Misaligned',p:s.aligned?'b':'s'},{l:'RSI ('+s.rsiV+')',v:s.rsiV>70?'Overbought':s.rsiV<35?'Oversold':'Neutral',p:s.rsiV>70?'s':s.rsiV<35?'b':'n'},{l:'MACD ('+s.macdV+')',v:s.macdV>0?'Positive':'Negative',p:s.macdV>0?'b':'s'},{l:'Volume',v:s.volSpike?'Spike':'Normal',p:s.volSpike?'b':'n'},{l:'EMA50 dist.',v:(Math.round(((s.price-s.e50)/s.e50)*10000)/100)+'%',p:s.price>s.e50?'b':'s'},{l:'R/R Ratio',v:'1:'+s.rr,p:s.rr>=2?'b':s.rr>=1?'n':'s'}];
  var sh='';for(var i=0;i<sbd.length;i++)sh+='<div class="sb-row"><span class="sb-lbl">'+sbd[i].l+'</span><span style="margin-right:.3rem;font-size:.55rem;">'+sbd[i].v+'</span><span class="pill p'+sbd[i].p+'">'+(sbd[i].p==='b'?'BULL':sbd[i].p==='s'?'BEAR':'NEUT')+'</span></div>';
  document.getElementById('sbRows').innerHTML=sh;
  document.getElementById('zoneEl').innerHTML='<div class="zone zb"><div class="zt">BUY ZONE</div>'+zr('Entry',s.cur+fmt(s.be))+zr('Target',s.cur+fmt(s.bt))+zr('Stop',s.cur+fmt(s.bs))+zr('Potential','+'+s.pot+'%')+zr('Risk','-'+s.rsk+'%')+zr('R/R','1:'+s.rr)+'</div><div class="zone zs"><div class="zt">SELL ZONE</div>'+zr('Exit',s.cur+fmt(s.se))+zr('Stop',s.cur+fmt(s.ss))+zr('RSI',s.rsiV>70?'WARN '+s.rsiV:'OK '+s.rsiV)+zr('MACD',s.macdV<0?'WARN '+s.macdV:''+s.macdV)+zr('EMA50',s.price<s.e50?'Below':'Above')+zr('Stack',s.aligned?'Intact':'Broken')+'</div>';
  var ah='';for(var i=0;i<s.reasons.length;i++)ah+='<div>- '+s.reasons[i]+'</div>';
  document.getElementById('spAnal').innerHTML=ah;
  drawChart(s);
  document.getElementById('spotEl').scrollIntoView({behavior:'smooth',block:'start'});
}
function zr(l,v){return '<div class="zrow"><span>'+l+'</span><span>'+v+'</span></div>';}
function drawChart(s){
  if(spChart){spChart.destroy();spChart=null;}
  var ctx=document.getElementById('spChart').getContext('2d'),n=s.hist.length,lb=[],e5=[],e10=[],e20=[];
  for(var i=0;i<n;i++){lb.push(i===n-1?'NOW':'');e5.push(s.e50);e10.push(s.e100);e20.push(s.e200);}
  spChart=new Chart(ctx,{type:'line',data:{labels:lb,datasets:[{data:s.hist,borderColor:'#cdd9e5',borderWidth:2,pointRadius:0,tension:0.3,fill:false},{data:e5,borderColor:'#00e676',borderWidth:1.5,pointRadius:0,borderDash:[5,3]},{data:e10,borderColor:'#00b8d4',borderWidth:1.5,pointRadius:0,borderDash:[5,3]},{data:e20,borderColor:'#ffab00',borderWidth:1.5,pointRadius:0,borderDash:[5,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#556070',font:{size:9}}}},animation:{duration:400}}});
}
function renderHeatmap(){
  var h='';
  for(var i=0;i<allData.length;i++){var s=allData[i],a=Math.min(Math.abs(s.change)/10,1),bg=s.change>=0?'rgba(0,230,118,'+(0.12+a*0.5)+')':'rgba(255,23,68,'+(0.12+a*0.5)+')';h+='<div class="hcell" style="background:'+bg+';" data-sym="'+s.sym+'"><span class="hsym">'+s.sym+'</span><span class="hpct '+(s.change>=0?'g':'r')+'">'+(s.change>=0?'+':'')+s.change+'%</span></div>';}
  document.getElementById('heatGrid').innerHTML=h;
  var cells=document.querySelectorAll('.hcell');
  for(var i=0;i<cells.length;i++)cells[i].addEventListener('click',function(){openSpot(this.getAttribute('data-sym'));});
}
function updateHours(){
  var now=new Date(),utcMs=now.getTime()+now.getTimezoneOffset()*60000,et=new Date(utcMs-4*3600000);
  var day=et.getDay(),tot=et.getHours()*60+et.getMinutes(),open=day>=1&&day<=5&&tot>=570&&tot<960;
  var nb=document.getElementById('nyseB'),ncd=document.getElementById('nyseCd');
  if(open){nb.textContent='OPEN';nb.className='badge open';var cm=960-tot;ncd.textContent='Closes in '+Math.floor(cm/60)+'h '+cm%60+'m';}
  else{nb.textContent='CLOSED';nb.className='badge closed';var nm=tot<570&&day>=1&&day<=5?570-tot:day===0?(1440-tot)+570:day===6?(1440-tot)+570+1440:(1440-tot)+570;ncd.textContent='Opens in '+Math.floor(nm/60)+'h '+nm%60+'m';}
  var ti=document.getElementById('tasiInfo');
  if(mkt==='tasi'){ti.style.display='inline-flex';var ast=new Date(utcMs+3*3600000),aday=ast.getDay(),atot=ast.getHours()*60+ast.getMinutes(),to=(aday===0||(aday>=1&&aday<=4))&&atot>=600&&atot<900;var tb=document.getElementById('tasiB');tb.textContent=to?'OPEN':'CLOSED';tb.className='badge '+(to?'open':'closed');}
  else ti.style.display='none';
}
function switchMkt(m){
  mkt=m;
  document.getElementById('btnUS').className='swb'+(m==='us'?' on':'');
  document.getElementById('btnSA').className='swb'+(m==='tasi'?' ons':'');
  document.getElementById('secLbl').innerHTML=m==='tasi'?'TASI <span>SIGNALS</span>':'US <span>SIGNALS</span>';
  fil='all';setFil('all');doRefresh();updateHours();
}
var sTimer=null;
document.getElementById('siEl').addEventListener('input',function(){
  clearTimeout(sTimer);var q=this.value.trim().toUpperCase();
  if(!q){var d=document.getElementById('srDrop');if(d)d.style.display='none';return;}
  sTimer=setTimeout(function(){
    var all=US.concat(TASI),hits=[],h='';
    for(var i=0;i<all.length&&hits.length<6;i++)if(all[i].sym.indexOf(q)>=0||all[i].name.toUpperCase().indexOf(q)>=0)hits.push(all[i]);
    for(var i=0;i<hits.length;i++){var s=hits[i],live=findS(s.sym),pr=live?(s.cur||'$')+fmt(live.price):'-';h+='<div style="padding:.45rem .75rem;cursor:pointer;font-size:.65rem;display:flex;gap:.5rem;align-items:center;border-bottom:1px solid #182030;" class="sri" data-sym="'+s.sym+'"><span style="color:#00b8d4;width:46px;flex-shrink:0;font-weight:bold;">'+s.sym+'</span><span style="flex:1;color:#556070;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+s.name+'</span><span>'+pr+'</span></div>';}
    var drop=document.getElementById('srDrop');
    if(!drop){drop=document.createElement('div');drop.id='srDrop';drop.style.cssText='position:absolute;top:100%;left:0;right:0;background:#101820;border:1px solid #1e2a3a;border-radius:4px;z-index:500;max-height:220px;overflow-y:auto;';document.querySelector('.search-row').style.position='relative';document.getElementById('siEl').after(drop);}
    drop.innerHTML=h;drop.style.display='block';
    var rows=drop.querySelectorAll('.sri');
    for(var i=0;i<rows.length;i++)rows[i].addEventListener('click',function(){document.getElementById('siEl').value='';document.getElementById('srDrop').style.display='none';openSpot(this.getAttribute('data-sym'));});
  },100);
});
document.addEventListener('click',function(e){if(!e.target.closest('.search-row')){var d=document.getElementById('srDrop');if(d)d.style.display='none';}});
var toastTm=null;
function toast(msg,cls){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(cls||'ti');clearTimeout(toastTm);toastTm=setTimeout(function(){t.classList.remove('show');},3000);}
document.getElementById('spClBtn').addEventListener('click',function(){document.getElementById('spotEl').style.display='none';});
function doRefresh(){
  loadData();renderHero();renderTicker();renderCards();renderHeatmap();
  var best=null;for(var i=0;i<allData.length;i++)if(allData[i].signal==='buy'){best=allData[i];break;}
  if(!best)best=allData[0];
  openSpot(best.sym);
}
updateHours();setInterval(updateHours,30000);doRefresh();
</script>
</body>
</html>
