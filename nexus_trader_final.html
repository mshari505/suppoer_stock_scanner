<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NEXUS TRADER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020408;--bg2:#060b12;--sf:#0a1018;--s2:#101820;--s3:#141e28;
  --b1:#182030;--b2:#1e2a3a;--b3:#243240;
  --buy:#00e676;--sell:#ff1744;--hold:#ffab00;
  --acc:#00b8d4;--sa:#ffab00;
  --tx:#cdd9e5;--mu:#556070;--mu2:#3a4858;
  --mono:'JetBrains Mono',monospace;--dis:'Orbitron',sans-serif;--body:'Syne',sans-serif;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--body);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,184,212,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,184,212,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:300;background:rgba(2,4,8,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--b2);padding:0 1rem}
.hdr-main{display:flex;align-items:center;height:52px;gap:.75rem}
.logo{font-family:var(--dis);font-size:1rem;font-weight:900;letter-spacing:3px;color:var(--acc);white-space:nowrap;flex-shrink:0}
.logo small{font-size:.42rem;letter-spacing:2px;color:var(--mu);vertical-align:middle;margin-left:.3rem}
.mkt-hours{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mh-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;justify-content:center}
.mh-lbl{font-family:var(--mono);font-size:.55rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu)}
.mh-time{font-family:var(--mono);font-size:.62rem;color:var(--tx)}
.mh-badge{font-family:var(--mono);font-size:.52rem;padding:.16rem .45rem;border-radius:2px;text-transform:uppercase;letter-spacing:1px}
.mh-badge.open{background:rgba(0,230,118,.12);color:var(--buy);border:1px solid rgba(0,230,118,.25)}
.mh-badge.closed{background:rgba(255,23,68,.1);color:var(--sell);border:1px solid rgba(255,23,68,.2)}
.mh-cd{font-family:var(--mono);font-size:.52rem;color:var(--mu)}
.hdr-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.mkt-sw{display:flex;border:1px solid var(--b2);border-radius:var(--r);overflow:hidden}
.msb{font-family:var(--dis);font-size:.5rem;letter-spacing:1.5px;padding:.4rem .7rem;border:none;background:transparent;color:var(--mu);cursor:pointer;transition:all .2s;white-space:nowrap;min-height:36px;touch-action:manipulation}
.msb.u{background:rgba(0,184,212,.12);color:var(--acc)}
.msb.s{background:rgba(255,171,0,.12);color:var(--sa)}
.hdr-search{padding:.45rem 0 .55rem;border-bottom:1px solid var(--b1)}
.sw{position:relative;max-width:600px;margin:0 auto}
.si{width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--tx);font-family:var(--mono);font-size:.72rem;padding:.5rem 2.4rem .5rem 2.1rem;outline:none;border-radius:var(--r);transition:border-color .2s;-webkit-appearance:none}
.si:focus{border-color:var(--acc)}
.si-ic{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none;font-size:.78rem}
.si-cl{position:absolute;right:.55rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;font-size:1rem;display:none;line-height:1;padding:0}
.sr-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);z-index:500;max-height:240px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.sri{display:flex;align-items:center;gap:.55rem;padding:.5rem .85rem;cursor:pointer;transition:background .12s;font-family:var(--mono);font-size:.66rem}
.sri:hover,.sri:active{background:var(--s3)}
.sri-sym{font-weight:500;color:var(--acc);width:48px;flex-shrink:0}
.sri-name{color:var(--mu);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sri-price{color:var(--tx);flex-shrink:0}
.sri-sig{font-size:.52rem;padding:.15rem .4rem;border-radius:2px;flex-shrink:0}
.sri-sig.buy{background:rgba(0,230,118,.12);color:var(--buy)}
.sri-sig.sell{background:rgba(255,23,68,.12);color:var(--sell)}
.sri-sig.hold{background:rgba(255,171,0,.12);color:var(--hold)}
.ticker-bar{height:30px;background:var(--sf);border-bottom:1px solid var(--b1);overflow:hidden;position:relative;z-index:1}
.tf{position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none}
.tf.l{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.tf.r{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.ticker-inner{display:flex;white-space:nowrap;animation:tscroll 60s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
@keyframes tscroll{to{transform:translateX(-50%)}}
.tick{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--mono);font-size:.62rem;padding:0 1.4rem;height:30px;border-right:1px solid var(--b2)}
.tsym{color:var(--acc);font-weight:500}
.g{color:var(--buy)}.r{color:var(--sell)}
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1rem}
.hero{display:grid;grid-template-columns:repeat(5,1fr);gap:.6rem;margin-bottom:1rem}
.hc{background:var(--sf);border:1px solid var(--b2);padding:.85rem 1rem;border-radius:var(--r)}
.hl{font-family:var(--mono);font-size:.52rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);margin-bottom:.35rem}
.hv{font-family:var(--dis);font-size:1.1rem;letter-spacing:1px}
.hs{font-family:var(--mono);font-size:.6rem;margin-top:.2rem}
.ctrl{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:1rem}
.sec-lbl{font-family:var(--dis);font-size:.72rem;letter-spacing:3px;flex:1;min-width:80px}
.sec-lbl span{color:var(--acc)}
.fb{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:1px;padding:.4rem .85rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:var(--r);transition:all .18s;min-height:36px;touch-action:manipulation}
.fb:hover{background:var(--s2)}
.fb.fa{border-color:var(--acc);color:var(--acc);background:rgba(0,184,212,.08)}
.fb.fbuy.fa{border-color:var(--buy);color:var(--buy);background:rgba(0,230,118,.08)}
.fb.fsell.fa{border-color:var(--sell);color:var(--sell);background:rgba(255,23,68,.08)}
.fb.fhold.fa{border-color:var(--hold);color:var(--hold);background:rgba(255,171,0,.08)}
.sort-sel{font-family:var(--mono);font-size:.58rem;background:var(--s2);border:1px solid var(--b2);color:var(--tx);padding:.4rem .7rem;border-radius:var(--r);cursor:pointer;outline:none;min-height:36px;-webkit-appearance:none}
.ref-btn{font-family:var(--mono);font-size:.58rem;padding:.4rem .85rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:var(--r);transition:all .18s;display:flex;align-items:center;gap:.35rem;min-height:36px;touch-action:manipulation}
.ref-btn:hover{border-color:var(--acc);color:var(--acc)}
.si2{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .6s linear infinite}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.85rem;margin-bottom:1.5rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.scard{background:var(--sf);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;contain:layout style}
.cs{height:3px}
.buy .cs{background:var(--buy)}.sell .cs{background:var(--sell)}.hold .cs{background:var(--hold)}
.cb{padding:1rem 1.1rem}
.cr1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.7rem}
.csym{font-family:var(--dis);font-size:1.35rem;letter-spacing:2px;line-height:1}
.cname{font-family:var(--mono);font-size:.52rem;color:var(--mu);margin-top:.2rem}
.stag{font-family:var(--mono);font-size:.52rem;text-transform:uppercase;letter-spacing:1.5px;padding:.2rem .55rem;border-radius:2px}
.stag.buy{background:rgba(0,230,118,.1);color:var(--buy);border:1px solid rgba(0,230,118,.2)}
.stag.sell{background:rgba(255,23,68,.1);color:var(--sell);border:1px solid rgba(255,23,68,.2)}
.stag.hold{background:rgba(255,171,0,.1);color:var(--hold);border:1px solid rgba(255,171,0,.2)}
.cprice{font-family:var(--dis);font-size:1.2rem;letter-spacing:1px;margin-bottom:.15rem}
.cchg{font-family:var(--mono);font-size:.65rem;margin-bottom:.8rem}
.ema-block{background:var(--bg2);border:1px solid var(--b1);padding:.6rem .7rem;margin-bottom:.7rem;border-radius:4px}
.ema-lbl{font-family:var(--mono);font-size:.5rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);margin-bottom:.45rem}
.ema-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.28rem;font-family:var(--mono);font-size:.58rem}
.ek{width:42px;color:var(--mu);font-size:.55rem}
.et{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden}
.ef{height:100%;border-radius:2px;transition:width .8s ease}
.efg{background:var(--buy)}.efr{background:var(--sell)}
.ep{width:68px;text-align:right;font-size:.58rem}
.ev{width:10px;text-align:center;font-size:.62rem}
.evg{color:var(--buy)}.evr{color:var(--sell)}
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;margin-bottom:.7rem}
.met{background:var(--bg2);border:1px solid var(--b1);padding:.4rem .45rem;border-radius:4px}
.ml{font-family:var(--mono);font-size:.5rem;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);margin-bottom:.15rem}
.mv{font-family:var(--mono);font-size:.72rem}
.act-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.35rem;margin-bottom:.6rem}
.abt{font-family:var(--mono);font-size:.52rem;text-transform:uppercase;letter-spacing:.5px;padding:.45rem .3rem;border-radius:var(--r);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:.12rem;border:1px solid;touch-action:manipulation;min-height:52px;justify-content:center;background:transparent}
.abt:active{transform:scale(.96)}
.abt-l{font-size:.46rem;opacity:.65}
.abt-v{font-size:.66rem;font-weight:500}
.abt.ent{border-color:rgba(0,184,212,.3);color:var(--acc)}
.abt.ent:active{background:rgba(0,184,212,.15)}
.abt.tgt{border-color:rgba(0,230,118,.3);color:var(--buy)}
.abt.tgt:active{background:rgba(0,230,118,.15)}
.abt.stp{border-color:rgba(255,23,68,.25);color:var(--sell)}
.abt.stp:active{background:rgba(255,23,68,.14)}
.chart-btn{width:100%;font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;padding:.58rem;border:1px solid var(--b2);background:var(--s2);color:var(--mu);cursor:pointer;border-radius:var(--r);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:.6rem;min-height:40px;touch-action:manipulation}
.chart-btn:hover,.chart-btn:active{border-color:var(--acc);color:var(--acc);background:rgba(0,184,212,.08)}
.reason-box{font-family:var(--mono);font-size:.58rem;color:var(--mu);line-height:1.65;border-left:2px solid var(--mu2);padding:.4rem .6rem;border-radius:0 4px 4px 0}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(10px);z-index:999;background:var(--s2);border:1px solid var(--b2);font-family:var(--mono);font-size:.66rem;padding:.6rem 1.2rem;border-radius:var(--r);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.tb{border-color:rgba(0,230,118,.4);color:var(--buy)}
.toast.ts{border-color:rgba(255,23,68,.4);color:var(--sell)}
.toast.ti{border-color:rgba(0,184,212,.4);color:var(--acc)}
.spotlight{background:var(--sf);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:1.5rem;overflow:hidden}
.sph{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.2rem;background:var(--s2);border-bottom:1px solid var(--b2)}
.sph-t{font-family:var(--dis);font-size:.62rem;letter-spacing:3px;color:var(--acc)}
.sph-cl{font-family:var(--mono);font-size:.56rem;padding:.3rem .7rem;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;border-radius:var(--r);transition:all .2s;touch-action:manipulation}
.sph-cl:active{border-color:var(--sell);color:var(--sell)}
.spbody{display:grid;grid-template-columns:1.3fr 1fr}
.spl{padding:1.2rem;border-right:1px solid var(--b2)}
.spr{padding:1.2rem;display:flex;flex-direction:column;gap:.8rem;overflow-y:auto;max-height:620px}
.sp-sym{font-family:var(--dis);font-size:2.2rem;font-weight:900;letter-spacing:3px;line-height:1}
.sp-name{font-family:var(--mono);font-size:.56rem;color:var(--mu);margin:.2rem 0 .8rem}
.sp-price{font-family:var(--dis);font-size:1.5rem;letter-spacing:2px;margin-bottom:.18rem}
.sp-chg{font-family:var(--mono);font-size:.68rem;margin-bottom:1rem}
.sp-act{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:1rem}
.sabt{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;padding:.6rem .4rem;border-radius:var(--r);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:.18rem;border:1px solid;min-height:58px;justify-content:center;touch-action:manipulation;background:transparent}
.sabt:active{transform:scale(.97)}
.sabt-l{font-size:.48rem;opacity:.65}
.sabt-v{font-size:.78rem;font-weight:500}
.sabt.ent{border-color:rgba(0,184,212,.4);color:var(--acc)}
.sabt.ent:active{background:rgba(0,184,212,.18)}
.sabt.tgt{border-color:rgba(0,230,118,.4);color:var(--buy)}
.sabt.tgt:active{background:rgba(0,230,118,.18)}
.sabt.stp{border-color:rgba(255,23,68,.35);color:var(--sell)}
.sabt.stp:active{background:rgba(255,23,68,.16)}
.chart-wrap{position:relative;height:185px;background:var(--bg2);border:1px solid var(--b1);border-radius:4px;margin-bottom:.65rem}
.chart-wrap canvas{width:100%!important;height:100%!important}
.cleg{display:flex;flex-wrap:wrap;gap:.8rem;font-family:var(--mono);font-size:.54rem;color:var(--mu)}
.cli{display:flex;align-items:center;gap:.3rem}
.sb-sec{background:var(--bg2);border:1px solid var(--b1);padding:.75rem;border-radius:4px}
.sb-t{font-family:var(--mono);font-size:.52rem;text-transform:uppercase;letter-spacing:2px;color:var(--mu);margin-bottom:.6rem}
.sb-row{display:flex;align-items:center;gap:.55rem;margin-bottom:.4rem;font-family:var(--mono);font-size:.58rem}
.sb-lbl{flex:1;color:var(--mu)}
.pill{font-size:.5rem;padding:.15rem .42rem;border-radius:2px}
.pb{background:rgba(0,230,118,.1);color:var(--buy);border:1px solid rgba(0,230,118,.2)}
.ps{background:rgba(255,23,68,.1);color:var(--sell);border:1px solid rgba(255,23,68,.2)}
.pn{background:rgba(255,171,0,.1);color:var(--hold);border:1px solid rgba(255,171,0,.2)}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.zone{border:1px solid var(--b2);padding:.75rem;border-radius:4px}
.zb{border-top:2px solid var(--buy)}.zs{border-top:2px solid var(--sell)}
.zt{font-family:var(--dis);font-size:.62rem;letter-spacing:2px;margin-bottom:.55rem}
.zb .zt{color:var(--buy)}.zs .zt{color:var(--sell)}
.zrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.56rem;color:var(--mu);margin-bottom:.28rem}
.zrow span:last-child{color:var(--tx)}
.heat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.4rem;margin-bottom:1.5rem}
.hcell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--r);transition:transform .15s;border:1px solid transparent;touch-action:manipulation}
.hcell:active{transform:scale(.95)}
.hsym{font-family:var(--dis);font-size:.62rem;letter-spacing:1px;margin-bottom:.18rem}
.hpct{font-family:var(--mono);font-size:.58rem}
footer{position:relative;z-index:1;border-top:1px solid var(--b1);padding:.85rem 1rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.4rem;font-family:var(--mono);font-size:.56rem;color:var(--mu)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
@media(max-width:768px){
  .hero{grid-template-columns:repeat(3,1fr)}
  .spbody{grid-template-columns:1fr}
  .spl{border-right:none;border-bottom:1px solid var(--b2)}
  .spr{max-height:none}
  .sp-sym{font-size:1.7rem}
  .zones{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .hero{grid-template-columns:1fr 1fr}
  .logo{font-size:.85rem}
  .mh-lbl{display:none}
  .ctrl{gap:.35rem}
}
</style>
</head>
<body>
<header>
  <div class="hdr-main">
    <div class="logo">NEXUS<small>TRADER</small></div>
    <div class="mkt-hours">
      <div class="mh-row">
        <span class="mh-lbl">NYSE</span>
        <span class="mh-time">9:30 AM - 4:00 PM ET</span>
        <span class="mh-badge closed" id="nyseStatus">Closed</span>
        <span class="mh-cd" id="nyseCd"></span>
      </div>
      <div class="mh-row" id="tasiRow" style="display:none">
        <span class="mh-lbl">Tadawul</span>
        <span class="mh-time">10:00 AM - 3:00 PM AST</span>
        <span class="mh-badge closed" id="tasiStatus">Closed</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="mkt-sw">
        <button class="msb u" id="btnUS" onclick="switchMkt('us')">US</button>
        <button class="msb" id="btnSA" onclick="switchMkt('tasi')">TASI</button>
      </div>
    </div>
  </div>
  <div class="hdr-search">
    <div class="sw">
      <span class="si-ic">&#128269;</span>
      <input type="text" class="si" id="siEl" placeholder="Search symbol or company..." autocomplete="off" spellcheck="false">
      <button class="si-cl" id="siCl" onclick="clearSearch()">x</button>
      <div class="sr-drop" id="srDrop"></div>
    </div>
  </div>
</header>
<div class="ticker-bar">
  <div class="tf l"></div>
  <div class="ticker-inner" id="tickerEl"></div>
  <div class="tf r"></div>
</div>
<main>
  <div class="hero" id="heroEl"></div>
  <div class="spotlight" id="spotEl">
    <div class="sph">
      <span class="sph-t">SIGNAL SPOTLIGHT</span>
      <button class="sph-cl" id="spClBtn">X CLOSE</button>
    </div>
    <div class="spbody">
      <div class="spl">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
          <div>
            <div class="sp-sym" id="spSym">-</div>
            <div class="sp-name" id="spName"></div>
          </div>
          <div class="stag buy" id="spTag">-</div>
        </div>
        <div class="sp-price g" id="spPrice"></div>
        <div class="sp-chg g" id="spChg"></div>
        <div class="sp-act" id="spAct"></div>
        <div class="chart-wrap"><canvas id="spChart"></canvas></div>
        <div class="cleg">
          <div class="cli"><span style="display:inline-block;width:14px;height:0;border-top:2px solid #cdd9e5"></span> Price</div>
          <div class="cli"><span style="display:inline-block;width:14px;height:0;border-top:2px dashed #00e676"></span> EMA50</div>
          <div class="cli"><span style="display:inline-block;width:14px;height:0;border-top:2px dashed #00b8d4"></span> EMA100</div>
          <div class="cli"><span style="display:inline-block;width:14px;height:0;border-top:2px dashed #ffab00"></span> EMA200</div>
        </div>
      </div>
      <div class="spr">
        <div class="sb-sec"><div class="sb-t">Signal Breakdown</div><div id="sbRows"></div></div>
        <div class="zones" id="zoneEl"></div>

function rng(s,n){return((Math.sin(s*n*9301+49297)*233280)%1+1)/2;}
function sdh(str){var a=0;for(var i=0;i<str.length;i++)a+=str.charCodeAt(i);return a;}
function buildStock(d){
  var s=sdh(d.sym);
  var f=function(n){return rng(s,n);};
  var trend=f(11)>0.5?1:-1;
  var price=parseFloat((d.base*(0.93+f(1)*0.14)).toFixed(2));
  var e50=parseFloat((price*(0.97+f(2)*0.025*trend)).toFixed(2));
  var e100=parseFloat((e50*(0.97+f(3)*0.025*trend)).toFixed(2));
  var e200=parseFloat((e100*(0.96+f(4)*0.03*trend)).toFixed(2));
  var change=parseFloat(((f(5)-0.46)*7).toFixed(2));
  var volume=Math.floor(f(6)*60000000+2000000);
  var avgVol=Math.floor(f(7)*45000000+5000000);
  var rsiV=parseFloat((28+f(8)*52).toFixed(1));
  var macdV=parseFloat(((f(9)-0.48)*5).toFixed(2));
  var aligned=price>e50&&e50>e100&&e100>e200;
  var volSpike=volume>avgVol*1.45;
  var signal='hold';
  if(aligned&&rsiV<66&&(macdV>0||volSpike))signal='buy';
  else if(!aligned||rsiV>73||macdV<-1.8)signal='sell';
  var reasons=mkReasons(signal,aligned,volSpike,rsiV,macdV,volume,avgVol,price,e50);
  var hist=[];
  var p=price*0.84;
  for(var i=0;i<60;i++){
    p*=(1+(Math.sin(s*i*0.28+i*0.4)*0.009+(f(i+20)-0.49)*0.018)*(trend>0?1.003:0.998));
    hist.push(parseFloat(p.toFixed(2)));
  }
  hist.push(price);
  var be=parseFloat((e50*0.993).toFixed(2));
  var bt=parseFloat((price*1.14).toFixed(2));
  var bs=parseFloat((e200*0.982).toFixed(2));
  var se=parseFloat((e50*1.005).toFixed(2));
  var ss=parseFloat((price*1.06).toFixed(2));
  var pot=parseFloat(((bt-be)/be*100).toFixed(1));
  var rsk=parseFloat(((be-bs)/be*100).toFixed(1));
  var rr=parseFloat((pot/Math.max(rsk,0.01)).toFixed(2));
  var cur=d.cur||'$';
  return{sym:d.sym,name:d.name,sector:d.sector,base:d.base,cur:cur,
    price:price,e50:e50,e100:e100,e200:e200,change:change,
    volume:volume,avgVol:avgVol,rsiV:rsiV,macdV:macdV,
    signal:signal,reasons:reasons,hist:hist,
    aligned:aligned,volSpike:volSpike,
    be:be,bt:bt,bs:bs,se:se,ss:ss,pot:pot,rsk:rsk,rr:rr};
}
function mkReasons(sig,al,vs,rsi,macd,vol,avg,price,e50){
  if(sig==='buy')return[
    al?'EMA50 > EMA100 > EMA200 - bullish stack confirmed':'Partial EMA alignment',
    'RSI '+rsi+' - not overbought',
    vs?'Volume +'+(((vol/avg-1)*100).toFixed(0))+'% above avg':'MACD positive momentum',
    'Price '+(((price-e50)/e50)*100).toFixed(1)+'% above EMA50'
  ];
  if(sig==='sell')return[
    price<e50?'EMA breakdown - price below EMA50':'EMA alignment broken',
    rsi>73?'RSI '+rsi+' - overbought':'Momentum weakening',
    macd<-1.8?'MACD '+macd+' - bearish divergence':'MACD turning negative',
    vs?'High sell-side volume':'Volume below average'
  ];
  return['EMA stack inconclusive','RSI '+rsi+' - neutral zone','Waiting for breakout','Monitor EMA50 cross'];
}
function loadData(){
  var list=mkt==='us'?US:TASI;
  allData=list.map(buildStock);
}
function fmt(n){
  if(n>=1000)return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n.toFixed(n<10?3:2);
}
function fmtVol(n){
  if(n>=1000000000)return (n/1000000000).toFixed(2)+'B';
  if(n>=1000000)return (n/1000000).toFixed(1)+'M';
  if(n>=1000)return (n/1000).toFixed(0)+'K';
  return String(n);
}
function renderHero(){
  var buys=0,sells=0,holds=0;
  for(var i=0;i<allData.length;i++){
    if(allData[i].signal==='buy')buys++;
    else if(allData[i].signal==='sell')sells++;
    else holds++;
  }
  var tg=allData[0],tl=allData[0],hv=allData[0];
  for(var i=1;i<allData.length;i++){
    if(allData[i].change>tg.change)tg=allData[i];
    if(allData[i].change<tl.change)tl=allData[i];
    if(allData[i].volume>hv.volume)hv=allData[i];
  }

function setFil(f){
  fil=f;
  var ids=['fAll','fBuy','fSell','fHold'];
  for(var i=0;i<ids.length;i++)document.getElementById(ids[i]).classList.remove('fa');
  var map={all:'fAll',buy:'fBuy',sell:'fSell',hold:'fHold'};
  document.getElementById(map[f]).classList.add('fa');
  renderCards();
}
function renderCards(){
  var sort=document.getElementById('sortSel').value;
  var data=allData.slice();
  if(fil!=='all'){
    var tmp=[];
    for(var i=0;i<data.length;i++)if(data[i].signal===fil)tmp.push(data[i]);
    data=tmp;
  }
  if(sort==='gain')data.sort(function(a,b){return b.change-a.change;});
  else if(sort==='loss')data.sort(function(a,b){return a.change-b.change;});
  else if(sort==='vol')data.sort(function(a,b){return b.volume-a.volume;});
  else if(sort==='rsi')data.sort(function(a,b){return a.rsiV-b.rsiV;});
  else if(sort==='rr')data.sort(function(a,b){return b.rr-a.rr;});
  else data.sort(function(a,b){var o={buy:0,sell:1,hold:2};return o[a.signal]-o[b.signal];});
  var html='';
  for(var i=0;i<data.length;i++)html+=makeCard(data[i],i);
  document.getElementById('cardsGrid').innerHTML=html;
  attachCardEvents(data);
}
function makeCard(s,i){
  var p50=Math.min((s.e50/s.price)*90,99);
  var p100=Math.min((s.e100/s.price)*90,99);
  var p200=Math.min((s.e200/s.price)*90,99);
  var a50=s.price>=s.e50,a100=s.price>=s.e100,a200=s.price>=s.e200;
  var rCol=s.rsiV>70?'var(--sell)':s.rsiV<35?'var(--buy)':'var(--tx)';
  var rrCol=s.rr>=2?'var(--buy)':s.rr>=1?'var(--tx)':'var(--sell)';
  var delay=i*0.02;
  return '<div class="scard '+s.signal+'" data-sym="'+s.sym+'" style="animation:fadeUp .3s ease '+delay+'s both">'+
    '<div class="cs"></div>'+
    '<div class="cb">'+
      '<div class="cr1">'+
        '<div><div class="csym">'+s.sym+'</div><div class="cname">'+s.name+'</div></div>'+
        '<div class="stag '+s.signal+'">'+s.signal.toUpperCase()+'</div>'+
      '</div>'+
      '<div class="cprice">'+s.cur+fmt(s.price)+'</div>'+
      '<div class="cchg '+(s.change>=0?'g':'r')+'">'+(s.change>=0?'+':'')+s.change+'% today</div>'+
      '<div class="ema-block">'+
        '<div class="ema-lbl">EMA Alignment</div>'+
        mkEmaRow('EMA 50',p50,a50,s.e50,s.cur)+
        mkEmaRow('EMA 100',p100,a100,s.e100,s.cur)+
        mkEmaRow('EMA 200',p200,a200,s.e200,s.cur)+
      '</div>'+
      '<div class="mets">'+
        '<div class="met"><div class="ml">RSI</div><div class="mv" style="color:'+rCol+'">'+s.rsiV+'</div></div>'+
        '<div class="met"><div class="ml">MACD</div><div class="mv '+(s.macdV>=0?'g':'r')+'">'+(s.macdV>=0?'+':'')+s.macdV+'</div></div>'+
        '<div class="met"><div class="ml">Volume</div><div class="mv">'+fmtVol(s.volume)+'</div></div>'+
        '<div class="met"><div class="ml">R/R</div><div class="mv" style="color:'+rrCol+'">'+s.rr+'</div></div>'+
      '</div>'+
      '<div class="act-row">'+
        '<button class="abt ent btn-ent" data-sym="'+s.sym+'"><span class="abt-l">Entry Price</span><span class="abt-v">'+s.cur+fmt(s.be)+'</span></button>'+
        '<button class="abt tgt btn-tgt" data-sym="'+s.sym+'"><span class="abt-l">Target Price</span><span class="abt-v">'+s.cur+fmt(s.bt)+'</span></button>'+
        '<button class="abt stp btn-stp" data-sym="'+s.sym+'"><span class="abt-l">Stop Loss</span><span class="abt-v">'+s.cur+fmt(s.bs)+'</span></button>'+
      '</div>'+
      '<button class="chart-btn btn-chart" data-sym="'+s.sym+'">View Chart + Full Analysis</button>'+
      '<div class="reason-box">'+s.reasons[0]+'</div>'+
    '</div>'+
  '</div>';
}
function mkEmaRow(lbl,pct,above,price,cur){
  return '<div class="ema-row">'+
    '<span class="ek">'+lbl+'</span>'+
    '<div class="et"><div class="ef '+(above?'efg':'efr')+'" style="width:'+pct+'%"></div></div>'+
    '<span class="ep">'+cur+fmt(price)+'</span>'+
    '<span class="ev '+(above?'evg':'evr')+'">'+(above?'up':'dn')+'</span>'+
  '</div>';
}

  var chartBtns=document.querySelectorAll('.btn-chart');
  for(var i=0;i<chartBtns.length;i++){
    chartBtns[i].addEventListener('click',function(e){
      e.stopPropagation();
      openSpot(this.getAttribute('data-sym'));
    });
  }
  var entBtns=document.querySelectorAll('.btn-ent');
  for(var i=0;i<entBtns.length;i++){
    entBtns[i].addEventListener('click',function(e){
      e.stopPropagation();
      var sym=this.getAttribute('data-sym');
      var s=findStock(sym);
      if(s)copyPrice(sym,'Entry Price',s.be,s.cur);

  }
  var tgtBtns=document.querySelectorAll('.btn-tgt');
  for(var i=0;i<tgtBtns.length;i++){
    tgtBtns[i].addEventListener('click',function(e){
      e.stopPropagation();
      var sym=this.getAttribute('data-sym');
      var s=findStock(sym);
      if(s)copyPrice(sym,'Target Price',s.bt,s.cur);
    });
  }
  var stpBtns=document.querySelectorAll('.btn-stp');
  for(var i=0;i<stpBtns.length;i++){
    stpBtns[i].addEventListener('click',function(e){
      e.stopPropagation();
      var sym=this.getAttribute('data-sym');
      var s=findStock(sym);
      if(s)copyPrice(sym,'Stop Loss',s.bs,s.cur);
    });
  }

function findStock(sym){
  for(var i=0;i<allData.length;i++)if(allData[i].sym===sym)return allData[i];
  return null;
}
function copyPrice(sym,label,price,cur){
  var txt=sym+' '+label+': '+cur+fmt(price);
  try{navigator.clipboard.writeText(txt);}catch(e){}
  var cls=label.indexOf('Target')>=0?'tb':label.indexOf('Stop')>=0?'ts':'ti';
  showToast('Copied: '+txt,cls);
}
function openSpot(sym){
  var s=findStock(sym);
  if(!s)return;
  document.getElementById('spotEl').style.display='';
  document.getElementById('spSym').textContent=s.sym;
  document.getElementById('spName').textContent=s.name+' - '+(mkt==='us'?'NASDAQ / NYSE':'Tadawul');
  document.getElementById('spPrice').textContent=s.cur+fmt(s.price);
  document.getElementById('spPrice').className='sp-price '+(s.change>=0?'g':'r');
  document.getElementById('spChg').textContent=(s.change>=0?'+':'')+s.change+'% today';
  document.getElementById('spChg').className='sp-chg '+(s.change>=0?'g':'r');

  document.getElementById('sa1').onclick=function(){copyPrice(s.sym,'Entry Price',s.be,s.cur);};
  document.getElementById('sa2').onclick=function(){copyPrice(s.sym,'Target Price',s.bt,s.cur);};
  document.getElementById('sa3').onclick=function(){copyPrice(s.sym,'Stop Loss',s.bs,s.cur);};
  var sbData=[
    {lbl:'EMA stack',val:s.aligned?'Bullish':'Misaligned',p:s.aligned?'b':'s'},
    {lbl:'RSI ('+s.rsiV+')',val:s.rsiV>70?'Overbought':s.rsiV<35?'Oversold':'Neutral',p:s.rsiV>70?'s':s.rsiV<35?'b':'n'},
    {lbl:'MACD ('+s.macdV+')',val:s.macdV>0?'Positive':'Negative',p:s.macdV>0?'b':'s'},
    {lbl:'Volume',val:s.volSpike?'Spike +'+((s.volume/s.avgVol-1)*100).toFixed(0)+'%':'Normal',p:s.volSpike?'b':'n'},
    {lbl:'EMA50 dist.',val:(((s.price-s.e50)/s.e50)*100).toFixed(2)+'%',p:s.price>s.e50?'b':'s'},
    {lbl:'R/R Ratio',val:'1:'+s.rr,p:s.rr>=2?'b':s.rr>=1?'n':'s'}
  ];
  var sbHtml='';
  for(var i=0;i<sbData.length;i++){
    var x=sbData[i];
    sbHtml+='<div class="sb-row"><span class="sb-lbl">'+x.lbl+'</span>'+
      '<span style="margin-right:.35rem;font-size:.58rem">'+x.val+'</span>'+
      '<span class="pill p'+x.p+'">'+(x.p==='b'?'BULL':x.p==='s'?'BEAR':'NEUT')+'</span></div>';
  }
  document.getElementById('sbRows').innerHTML=sbHtml;
  document.getElementById('zoneEl').innerHTML=
    '<div class="zone zb"><div class="zt">BUY ZONE</div>'+
      zr('Entry',s.cur+fmt(s.be))+zr('Target',s.cur+fmt(s.bt))+zr('Stop',s.cur+fmt(s.bs))+
      zr('Potential','+'+s.pot+'%')+zr('Risk','-'+s.rsk+'%')+zr('R/R','1:'+s.rr)+
    '</div>'+
    '<div class="zone zs"><div class="zt">SELL ZONE</div>'+
      zr('Exit',s.cur+fmt(s.se))+zr('Stop',s.cur+fmt(s.ss))+
      zr('RSI',s.rsiV>70?'Warn '+s.rsiV:'OK '+s.rsiV)+
      zr('MACD',s.macdV<0?'Warn '+s.macdV:''+s.macdV)+
      zr('EMA50',s.price<s.e50?'Below':'Above')+
      zr('Stack',s.aligned?'Intact':'Broken')+
    '</div>';
  var analHtml='';
  for(var i=0;i<s.reasons.length;i++)analHtml+='<div>- '+s.reasons[i]+'</div>';
  document.getElementById('spAnal').innerHTML=analHtml;
  drawChart(s);
  document.getElementById('spotEl').scrollIntoView({behavior:'smooth',block:'start'});
}
function zr(l,v){return '<div class="zrow"><span>'+l+'</span><span>'+v+'</span></div>';}
function drawChart(s){
  if(spChart){spChart.destroy();spChart=null;}
  var ctx=document.getElementById('spChart').getContext('2d');
  var n=s.hist.length;
  var labels=[];
  for(var i=0;i<n;i++)labels.push(i===n-1?'NOW':'');
  var e50line=[],e100line=[],e200line=[];
  for(var i=0;i<n;i++){e50line.push(s.e50);e100line.push(s.e100);e200line.push(s.e200);}
  spChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {data:s.hist,borderColor:'#cdd9e5',borderWidth:2,pointRadius:0,tension:0.3,fill:false},
        {data:e50line,borderColor:'#00e676',borderWidth:1.5,pointRadius:0,borderDash:[5,3]},
        {data:e100line,borderColor:'#00b8d4',borderWidth:1.5,pointRadius:0,borderDash:[5,3]},
        {data:e200line,borderColor:'#ffab00',borderWidth:1.5,pointRadius:0,borderDash:[5,3]}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(6,11,18,0.95)'}},
      scales:{
        x:{display:false},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#556070',font:{size:9,family:'JetBrains Mono'}}}
      },
      animation:{duration:400}
    }
  });
}
function renderHeatmap(){
  var html='';
  for(var i=0;i<allData.length;i++){
    var s=allData[i];
    var abs=Math.min(Math.abs(s.change)/10,1);
    var alpha=0.12+abs*0.5;
    var bg=s.change>=0?'rgba(0,230,118,'+alpha+')':'rgba(255,23,68,'+alpha+')';
    html+='<div class="hcell" style="background:'+bg+'" data-sym="'+s.sym+'">'+
      '<span class="hsym">'+s.sym+'</span>'+
      '<span class="hpct '+(s.change>=0?'g':'r')+'">'+(s.change>=0?'+':'')+s.change+'%</span>'+
    '</div>';
  }
  document.getElementById('heatGrid').innerHTML=html;
  var cells=document.querySelectorAll('.hcell');
  for(var i=0;i<cells.length;i++){
    cells[i].addEventListener('click',function(){openSpot(this.getAttribute('data-sym'));});
  }
}
var searchTimer=null;
document.getElementById('siEl').addEventListener('input',function(){
  clearTimeout(searchTimer);
  var q=this.value.trim().toUpperCase();
  document.getElementById('siCl').style.display=q?'block':'none';
  if(!q){closeDrop();return;}
  var that=this;
  searchTimer=setTimeout(function(){doSearch(q);},80);
});
document.getElementById('siEl').addEventListener('keydown',function(e){if(e.key==='Escape')clearSearch();});
document.addEventListener('click',function(e){if(!e.target.closest('.sw'))closeDrop();});
function doSearch(q){
  var all=US.concat(TASI);
  var hits=[];
  for(var i=0;i<all.length;i++){
    if(all[i].sym.indexOf(q)>=0||all[i].name.toUpperCase().indexOf(q)>=0)hits.push(all[i]);
    if(hits.length>=8)break;
  }
  if(!hits.length){closeDrop();return;}
  var html='';
  for(var i=0;i<hits.length;i++){
    var s=hits[i];
    var live=findStock(s.sym);
    var price=live?(s.cur||'$')+fmt(live.price):'-';
    var sig=live?'<span class="sri-sig '+live.signal+'">'+live.signal.toUpperCase()+'</span>':'';
    html+='<div class="sri" data-sym="'+s.sym+'"><span class="sri-sym">'+s.sym+'</span>'+
      '<span class="sri-name">'+s.name+'</span><span class="sri-price">'+price+'</span>'+sig+'</div>';
  }
  var drop=document.getElementById('srDrop');
  drop.innerHTML=html;
  drop.style.display='block';
  var rows=drop.querySelectorAll('.sri');
  for(var i=0;i<rows.length;i++){
    rows[i].addEventListener('click',function(){searchSel(this.getAttribute('data-sym'));});
  }
}
function searchSel(sym){
  clearSearch();
  var inT=false;
  for(var i=0;i<TASI.length;i++)if(TASI[i].sym===sym){inT=true;break;}
  var inU=false;
  for(var i=0;i<US.length;i++)if(US[i].sym===sym){inU=true;break;}
  if(inT&&mkt!=='tasi'){switchMkt('tasi');setTimeout(function(){openSpot(sym);},500);return;}
  if(inU&&mkt!=='us'){switchMkt('us');setTimeout(function(){openSpot(sym);},500);return;}
  openSpot(sym);
}
function clearSearch(){
  document.getElementById('siEl').value='';
  document.getElementById('siCl').style.display='none';
  closeDrop();
}
function closeDrop(){document.getElementById('srDrop').style.display='none';}
function updateMarketHours(){
  var now=new Date();
  var utcMs=now.getTime()+now.getTimezoneOffset()*60000;
  var etMs=utcMs+3600000*(-4);
  var et=new Date(etMs);
  var day=et.getDay();
  var tot=et.getHours()*60+et.getMinutes();
  var nyseOpen=day>=1&&day<=5&&tot>=570&&tot<960;
  var ns=document.getElementById('nyseStatus');
  var ncd=document.getElementById('nyseCd');
  if(nyseOpen){
    ns.textContent='OPEN';ns.className='mh-badge open';
    var cm=960-tot;
    ncd.textContent='Closes in '+Math.floor(cm/60)+'h '+cm%60+'m';
  }else{
    ns.textContent='CLOSED';ns.className='mh-badge closed';
    var nm;
    if(tot<570&&day>=1&&day<=5)nm=570-tot;
    else if(day===6)nm=(1440-tot)+570+1440;
    else if(day===0)nm=(1440-tot)+570;
    else nm=(1440-tot)+570;
    if(nm>1440)nm=nm%1440+1440;
    ncd.textContent='Opens in '+Math.floor(nm/60)+'h '+nm%60+'m';
  }
  var tr=document.getElementById('tasiRow');
  if(mkt==='tasi'){
    tr.style.display='flex';
    var astMs=utcMs+3600000*3;
    var ast=new Date(astMs);
    var aday=ast.getDay();
    var atot=ast.getHours()*60+ast.getMinutes();
    var tasiOpen=(aday===0||(aday>=1&&aday<=4))&&atot>=600&&atot<900;
    var ts=document.getElementById('tasiStatus');
    ts.textContent=tasiOpen?'OPEN':'CLOSED';
    ts.className='mh-badge '+(tasiOpen?'open':'closed');
  }else{
    tr.style.display='none';
  }
}
function switchMkt(m){
  mkt=m;
  document.getElementById('btnUS').className='msb'+(m==='us'?' u':'');
  document.getElementById('btnSA').className='msb'+(m==='tasi'?' s':'');
  document.getElementById('secLbl').innerHTML=m==='tasi'?'TASI <span>SIGNALS</span>':'US <span>SIGNALS</span>';
  fil='all';
  setFil('all');
  doRefresh();
  updateMarketHours();
}
var toastT=null;
function showToast(msg,cls){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+(cls||'ti');
  clearTimeout(toastT);
  toastT=setTimeout(function(){t.classList.remove('show');},3000);
}
function doRefresh(){
  var ico=document.getElementById('spinIco');
  ico.classList.add('spinning');
  loadData();
  renderHero();
  renderTicker();
  renderCards();
  renderHeatmap();
  var best=null;
  for(var i=0;i<allData.length;i++)if(allData[i].signal==='buy'){best=allData[i];break;}
  if(!best)best=allData[0];
  openSpot(best.sym);
  document.getElementById('lastUpd').textContent='Updated: '+new Date().toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit'});
  ico.classList.remove('spinning');
  clearTimeout(rTimer);
  rTimer=setTimeout(doRefresh,90000);
}
document.getElementById('spClBtn').addEventListener('click',function(){
  document.getElementById('spotEl').style.display='none';
});
updateMarketHours();
setInterval(updateMarketHours,30000);
doRefresh();
</script>
</body>
</html>
